<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>相機校正錄影工具</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#fff; font-family:-apple-system,sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
  #status-bar { background:#111; padding:10px 16px; font-size:13px; color:#aaa; flex-shrink:0; }
  #camera-container { position:relative; flex:1; background:#000; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  #video { position:absolute; width:100%; height:100%; object-fit:cover; }
  #timer-badge { position:absolute; top:12px; left:12px; background:rgba(0,0,0,0.75); border-radius:10px; padding:10px 14px; font-size:28px; font-weight:700; font-variant-numeric:tabular-nums; }
  #timer-label { font-size:11px; color:#888; }
  #bottom-bar { background:#111; padding:16px 20px; display:flex; flex-direction:column; align-items:center; gap:10px; flex-shrink:0; }
  #rec-btn { width:72px; height:72px; border-radius:50%; border:4px solid #fff; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  #rec-btn .inner { width:56px; height:56px; border-radius:50%; background:#ff3333; transition:all 0.2s; }
  #rec-btn.recording .inner { border-radius:8px; width:30px; height:30px; }
  #hint { font-size:12px; color:#888; text-align:center; padding:0 20px; }
  #download-area { display:none; flex-direction:column; align-items:center; gap:8px; }
  #download-link { background:#4caf50; color:#fff; padding:12px 20px; border-radius:10px; text-decoration:none; font-weight:600; font-size:14px; }
</style>
</head>
<body>
<div id="status-bar">等待攝影機...</div>
<div id="camera-container">
  <video id="video" autoplay playsinline muted></video>
  <div id="timer-badge"><div id="timer-num">00:00</div><div id="timer-label">錄影時間</div></div>
</div>
<div id="bottom-bar">
  <button id="rec-btn"><div class="inner"></div></button>
  <div id="hint" id="hint-text">把整張棋盤格慢慢移到畫面中央、四個角落、上下左右邊緣都要拍到，建議錄 20-30 秒，移動時放慢速度。錄完按一次下載，把檔案傳給 Claude。</div>
  <div id="download-area">
    <a id="download-link" href="#" download="calib_video.webm">下載錄影檔案</a>
  </div>
</div>
<script>
let mediaRecorder = null, recordedChunks = [], isRecording = false, recordStart = null, timerInterval = null;

async function startCamera(){
  try{
    // 與 pin_angle_checker.html 完全相同的相機約束條件，確保校正出來的內參跟主程式實際使用的畫面一致
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:2560},height:{ideal:1440},frameRate:{ideal:30,min:24}},audio:false});
    const video = document.getElementById('video');
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      document.getElementById('status-bar').textContent = '攝影機就緒 ' + video.videoWidth + 'x' + video.videoHeight;
    };
    window._calibStream = stream;
  }catch(e){
    document.getElementById('status-bar').textContent = '無法存取相機：' + e.message;
  }
}

function pickMimeType(){
  const candidates = ['video/mp4;codecs=h264','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
  for(const c of candidates){ if(window.MediaRecorder && MediaRecorder.isTypeSupported(c)) return c; }
  return '';
}

function startRecording(){
  const stream = window._calibStream;
  if(!stream){ document.getElementById('status-bar').textContent = '攝影機尚未就緒'; return; }
  recordedChunks = [];
  const mimeType = pickMimeType();
  try{
    mediaRecorder = mimeType ? new MediaRecorder(stream, {mimeType}) : new MediaRecorder(stream);
  }catch(e){
    document.getElementById('status-bar').textContent = '錄影初始化失敗：' + e.message;
    return;
  }
  mediaRecorder.ondataavailable = (e) => { if(e.data && e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const type = mediaRecorder.mimeType || 'video/webm';
    const blob = new Blob(recordedChunks, {type});
    const ext = type.includes('mp4') ? 'mp4' : 'webm';
    const url = URL.createObjectURL(blob);
    const link = document.getElementById('download-link');
    link.href = url;
    link.download = 'calib_video.' + ext;
    document.getElementById('download-area').style.display = 'flex';
    document.getElementById('hint-text').textContent = '錄好了！按下面綠色按鈕下載，下載完傳給 Claude。也可以再錄一次覆蓋。';
  };
  mediaRecorder.start();
  isRecording = true;
  recordStart = Date.now();
  document.getElementById('rec-btn').classList.add('recording');
  document.getElementById('download-area').style.display = 'none';
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - recordStart) / 1000);
    const m = String(Math.floor(elapsed / 60)).padStart(2,'0');
    const s = String(elapsed % 60).padStart(2,'0');
    document.getElementById('timer-num').textContent = m + ':' + s;
  }, 500);
}

function stopRecording(){
  if(mediaRecorder && isRecording){
    mediaRecorder.stop();
  }
  isRecording = false;
  clearInterval(timerInterval);
  document.getElementById('rec-btn').classList.remove('recording');
}

document.getElementById('rec-btn').addEventListener('click', () => {
  if(isRecording) stopRecording(); else startRecording();
});
startCamera();
</script>
</body>
</html>
