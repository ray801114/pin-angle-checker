<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>相機校正拍攝工具</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#fff; font-family:-apple-system,sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
  #status-bar { background:#111; padding:10px 16px; font-size:13px; color:#aaa; flex-shrink:0; }
  #camera-container { position:relative; flex:1; background:#000; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  #video { position:absolute; width:100%; height:100%; object-fit:cover; }
  #count-badge { position:absolute; top:12px; left:12px; background:rgba(0,0,0,0.75); border-radius:10px; padding:10px 14px; font-size:28px; font-weight:700; }
  #count-label { font-size:11px; color:#888; }
  #bottom-bar { background:#111; padding:16px 20px; display:flex; flex-direction:column; align-items:center; gap:10px; flex-shrink:0; }
  #shot-btn { width:72px; height:72px; border-radius:50%; border:4px solid #fff; background:#ff3333; cursor:pointer; }
  #shot-btn:active { background:#cc0000; }
  #hint { font-size:12px; color:#888; text-align:center; padding:0 20px; }
  #flash { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; transition:opacity 0.1s; }
  #flash.on { opacity:0.6; }
</style>
</head>
<body>
<div id="status-bar">等待攝影機...</div>
<div id="camera-container">
  <video id="video" autoplay playsinline muted></video>
  <div id="flash"></div>
  <div id="count-badge"><div id="count-num">0</div><div id="count-label">張已拍攝</div></div>
</div>
<div id="bottom-bar">
  <button id="shot-btn"></button>
  <div id="hint">把整張棋盤格慢慢移到畫面中央、四個角落、上下左右邊緣，每個位置按一次快門，建議拍 15-20 張。拍完後手機相簿裡會有檔案，請全部傳給 Claude。</div>
</div>
<script>
let count = 0;
async function startCamera(){
  try{
    // 與 pin_angle_checker.html 完全相同的相機約束條件，確保校正出來的內參跟主程式實際使用的畫面一致
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:2560},height:{ideal:1440},frameRate:{ideal:30,min:24}},audio:false});
    const video = document.getElementById('video');
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      document.getElementById('status-bar').textContent = '攝影機就緒 ' + video.videoWidth + 'x' + video.videoHeight;
    };
  }catch(e){
    document.getElementById('status-bar').textContent = '無法存取相機：' + e.message;
  }
}
function capture(){
  const video = document.getElementById('video');
  if(video.readyState < 2) return;
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  canvas.toBlob((blob) => {
    count++;
    document.getElementById('count-num').textContent = count;
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'calib_' + String(count).padStart(2,'0') + '.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }, 'image/png');
  const flash = document.getElementById('flash');
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 100);
}
document.getElementById('shot-btn').addEventListener('click', capture);
startCamera();
</script>
</body>
</html>
